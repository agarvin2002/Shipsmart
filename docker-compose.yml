services:
  postgres:
    image: postgres:14-alpine
    container_name: shipsmart-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shipsmart_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shipsmart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shipsmart-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - shipsmart-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fake-s3:
    image: adobe/s3mock:latest
    container_name: shipsmart-s3
    environment:
      - initialBuckets=shipsmart-uploads,shipsmart-documents
    ports:
      - "${S3_PORT:-9090}:9090"
      - "${S3_HTTP_PORT:-9191}:9191"
    networks:
      - shipsmart-network

  # Docker Registry - Local container registry (replaces ECR)
  registry:
    image: registry:2
    container_name: shipsmart-registry
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - shipsmart-network

  # Jenkins - CI/CD Server
  jenkins:
    image: jenkins/jenkins:lts
    container_name: shipsmart-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"    # Web UI
      - "50000:50000"  # Agent communication
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    networks:
      - shipsmart-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  jenkins_home:
  registry_data:

networks:
  shipsmart-network:
    driver: bridge
