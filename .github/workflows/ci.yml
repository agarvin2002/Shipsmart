name: CI - Build and Push to ECR

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      node_env:
        description: 'Environment for build'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: 'development'
  workflow_call:
    inputs:
      node_env:
        description: 'Environment for build'
        required: false
        type: string
        default: 'development'
    outputs:
      image_tag:
        description: 'Docker image tag pushed to ECR'
        value: ${{ jobs.build-push.outputs.image_tag }}
      image_uri:
        description: 'Full ECR image URI'
        value: ${{ jobs.build-push.outputs.image_uri }}

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shipsmart-api

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and activate Yarn 3.6.1
        run: |
          corepack enable
          corepack prepare yarn@3.6.1 --activate
          yarn --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull configuration from S3
        run: |
          echo "Pulling configuration files from S3..."
          aws s3 cp s3://shipsmart-config/ config/ --recursive
          ls -la config/

      - name: Install dependencies
        run: |
          echo "Running make dev-clean-install..."
          make dev-clean-install

      - name: Run linting
        run: |
          echo "Running ESLint..."
          yarn lint
        continue-on-error: true

      - name: Run tests
        run: |
          echo "Running tests..."
          cd service && yarn test
        continue-on-error: true

  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_uri: ${{ steps.push.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine NODE_ENV
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "node_env=${{ inputs.node_env }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_call" ]; then
            echo "node_env=${{ inputs.node_env }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "node_env=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "node_env=staging" >> $GITHUB_OUTPUT
          else
            echo "node_env=development" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract branch name
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BRANCH_NAME=${BRANCH_NAME//\//-}
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Generate Docker metadata
        id: meta
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG="${{ steps.branch.outputs.name }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)

          echo "tags=$IMAGE_TAG,$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          build-args: |
            NODE_ENV=${{ steps.env.outputs.node_env }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag latest for main branch
        if: github.ref == 'refs/heads/main'
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }} \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker images to ECR
        id: push
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ steps.meta.outputs.image_tag }}
          SHORT_SHA=${{ steps.meta.outputs.short_sha }}

          echo "Pushing images to ECR..."
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$SHORT_SHA

          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          fi

          IMAGE_URI="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Successfully pushed: $IMAGE_URI"

      - name: Summary
        run: |
          echo "### 🚀 Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ steps.env.outputs.node_env }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ steps.branch.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: ${{ steps.meta.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Short SHA**: ${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**ECR Repository**: ${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Full Image URI**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.push.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
