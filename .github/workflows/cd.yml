name: CD - Deploy to ECS

# Deploys a previously built Docker image (from ECR) to the target ECS environment.
# Trigger manually from GitHub Actions UI with the image tag from the CI workflow.
#
# Usage:
#   1. Run the CI workflow to build and get an image tag (e.g., develop-a3f9c2b)
#   2. Run this workflow with that image_tag and the target environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - demo
          - production
        default: 'staging'
      image_tag:
        description: 'Docker image tag to deploy (e.g., develop-a3f9c2b)'
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: shipsmart

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deployment-url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify image exists in ECR
        run: |
          echo "Verifying image exists in ECR..."
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ inputs.image_tag }} \
            --region ${{ env.AWS_REGION }} || {
              echo "❌ Error: Image tag '${{ inputs.image_tag }}' not found in ECR"
              echo "Please run the CI workflow first to build and push the image"
              exit 1
            }
          echo "✅ Image verified in ECR"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run deployment script
        run: |
          echo "Running deployment script..."
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh ${{ inputs.environment }} ${{ inputs.image_tag }}

      - name: Get deployment URL
        id: deployment-url
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            echo "url=https://api.shipsmart.com" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.environment }}" == "demo" ]; then
            echo "url=https://demo-api.shipsmart.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging-api.shipsmart.com" >> $GITHUB_OUTPUT
          fi

      - name: Deployment Summary
        run: |
          echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**ECR Repository**: \`${{ env.ECR_REPOSITORY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**AWS Region**: \`${{ env.AWS_REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deployment-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
