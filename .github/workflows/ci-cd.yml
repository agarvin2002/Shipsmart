name: CI/CD - Build and Deploy

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: shipsmart-api

jobs:
  build:
    name: Build and Push
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      node_env: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
    needs: build
    uses: ./.github/workflows/cd.yml
    secrets: inherit
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      image_tag: ${{ needs.build.outputs.image_tag }}

  notify-success:
    name: Notify Success
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Deployment Success Summary
        run: |
          ENVIRONMENT="${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}"

          echo "### ✅ CI/CD Pipeline Completed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`$ENVIRONMENT\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: \`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image URI**: \`${{ needs.build.outputs.image_uri }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Application deployed successfully to $ENVIRONMENT!" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify Failure
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Deployment Failure Summary
        run: |
          ENVIRONMENT="${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}"

          echo "### ❌ CI/CD Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`$ENVIRONMENT\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required**: Fix the issue and push again to retry deployment." >> $GITHUB_STEP_SUMMARY
